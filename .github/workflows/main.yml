name: Ansible Lint and Syntax Check
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Opting into Node.js 24 early to avoid the June 2nd cutoff
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Upgraded from v3

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded from v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible-lint ansible

      - name: Run Ansible Lint
        run: ansible-lint .
        continue-on-error: true # Prevents Exit Code 4 from stopping the whole pipeline

      - name: Run Syntax Check
        run: ansible-playbook site.yml --syntax-check
